<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Aplicación Pokédex construida con React, TypeScript, Vite y Module Federation. Incluye login, búsqueda exacta, microfrontends, historial persistente, tema claro y oscuro, y consumo de PokeAPI."
    />

    <meta name="theme-color" content="#0f172a" />

    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('pokemon_theme');
          var theme = storedTheme ? JSON.parse(storedTheme) : 'dark';

          if (theme !== 'dark' && theme !== 'light') {
            theme = 'dark';
          }

          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>

    <link rel="manifest" href="/manifest.webmanifest" />

    <meta property="og:title" content="Pokémon Microfrontends Challenge" />
    <meta
      property="og:description"
      content="Reto técnico frontend senior con React, Vite, TypeScript, Module Federation, PokeAPI, búsqueda exacta, historial persistente y tema claro/oscuro."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pokemon-shell-mf.netlify.app/" />

    <title>Pokémon Microfrontends Challenge</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
